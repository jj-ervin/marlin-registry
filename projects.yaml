version: "1.0"
updated: "2026-06-06"  # DCP planning docs added; README + --help complete

# ── DEV CONTROL PLANE (this repo) ────────────────────────────────────────────
#
# DCP is C:\dev itself — the portfolio control plane.
# It is not listed as a child project; it IS the registry.
# Planning docs live at root: DEV-PLAN.md, DEV-PATH.md, DEV-CONTROL-PLANE.md
root: "c:/dev"

# Status values: active | stable | wip | scaffold | archive
# Relationship keys: runtime_of | site_for | governance_package | depends_on | publishes_to

projects:

  # ─── DEVX CONTROL PLANE ─────────────────────────────────────────────────────

  - name: devx-control-plane
    path: devx-control-plane
    group: dcp
    description: "DevX Control Plane — distributable product repo (clean stub of C:\\dev)"
    status: active
    branch: main
    planning:
      canonical: devx-control-plane/DEV-PLAN.md
      path: devx-control-plane/DEV-PATH.md

  # ─── ECO ECOSYSTEM ───────────────────────────────────────────────────────────

  - name: eco
    path: eco
    group: eco-ecosystem
    description: "Governed execution platform for operational and AI-assisted workflows"
    status: active
    branch: main
    planning:
      canonical: eco/DEV-PLAN.md
      path: eco/DEV-PATH.md
      tracks: eco/TRACKS.md
      notes: "Owns master eco product/release planning; child track files live under eco/tracks/."

  - name: eco-edge
    path: eco-edge
    group: eco-ecosystem
    description: "Edge runtime layer for eco"
    status: active
    branch: main
    runtime_of: eco
    planning:
      canonical: eco/tracks/TRACK-A.md
      notes: "Tracked as part of eco Track A until eco-edge receives its own canonical plan."

  - name: eco-slate
    path: eco-slate
    group: eco-ecosystem
    description: "Governance companion for eco OS — docs, registry rules, roadmap stewardship"
    status: active
    branch: main
    governance_package: eco
    planning:
      roadmap: eco-slate/docs/roadmap.md

  - name: eco-slate-www
    path: eco-slate-www
    group: eco-ecosystem
    description: "Public web presence for eco-slate"
    status: active
    branch: main
    site_for: eco-slate
    planning:
      canonical: eco-slate-www/docs/DEV_PLAN.md
      path: eco-slate-www/docs/DEV_PATH.md

  - name: eco.vs
    path: eco.vs
    group: eco-ecosystem
    description: "VS Code extension layer for eco"
    status: wip
    branch: ~
    runtime_of: eco
    planning:
      canonical: eco/tracks/TRACK-B.md
      notes: "Tracked as part of eco Track B until eco.vs receives its own canonical plan."

  - name: .eco
    path: .eco
    group: eco-ecosystem
    description: "eco governance kernel — runtime config, models, and enforcement rules"
    status: active
    branch: main
    governance_package: eco
    planning:
      path: .eco/dev-path.md
      changelog: .eco/passchangelog.md
      notes: "Runtime-kernel path only; not the eco product roadmap."

  - name: eos
    path: eos
    group: eco-ecosystem
    description: "eOS — bootable front door for the .eco governance kernel and eco environment"
    status: active
    branch: main
    runtime_of: eco
    planning:
      canonical: eco/DEV-PLAN.md
      notes: "Direction currently inherited from eco governance/runtime planning."

  - name: ons
    path: governance-commons/ons
    group: eco-ecosystem
    description: "Ontic Namespace Structure — canonical naming and validation rule IDs"
    status: stable
    branch: main
    governance_package: eco
    planning:
      notes: "Stable Governance Commons standard; no standalone roadmap found in active scan."

  # ─── COCKPIT ─────────────────────────────────────────────────────────────────
  # UI/UX layer for eco — portable across apps, mods, platforms, and devices

  - name: cockpit
    path: cockpit
    group: cockpit
    description: "Portable UI/UX shell for eco and other apps, mods, and platforms/devices"
